name: Main CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code Quality Checks
    uses: ./.github/workflows/code-quality.yml

  build:
    name: Build Firmware
    needs: code-quality
    uses: ./.github/workflows/build.yml

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [code-quality, build]
    if: always()
    steps:
      - name: Check pipeline status
        run: |
          echo "## Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Code Quality: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build:        ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "❌ **Some jobs failed. Please check the logs for details.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          elif [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "⚠️ **Some jobs were cancelled.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **All jobs completed successfully!**" >> $GITHUB_STEP_SUMMARY
          fi
