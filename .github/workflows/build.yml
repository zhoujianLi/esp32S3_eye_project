name: Build Firmware

on:
  push:
    branches: [ ci/phase-2-build-workflow ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      idf_version:
        description: 'ESP-IDF Version (only for manual runs)'
        required: false
        default: 'v5.5.4'
        type: string
  workflow_call:

env:
  DEFAULT_TARGET: esp32s3
  ARTIFACTS_DIR: artifacts

jobs:
  prepare-matrix:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.examples.outputs.examples }}
      idf-versions: ${{ steps.versions.outputs.idf-versions }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Discover examples
        id: examples
        run: |
          EXAMPLES=$(find examples -name "CMakeLists.txt" -mindepth 2 -maxdepth 2 -exec dirname {} \; | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "examples=$EXAMPLES" >> $GITHUB_OUTPUT
          echo "Discovered examples: $EXAMPLES"

      - name: Decide IDF version matrix (smart matrix)
        id: versions
        run: |
          # Smart matrix policy:
          # - PR: only latest IDF (fast feedback)
          # - Push to main / schedule / manual: full matrix (full safety)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSIONS='["v5.5.4"]'
            echo "Pull request detected -> latest IDF only"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.idf_version }}" ]; then
            VERSIONS='["${{ inputs.idf_version }}"]'
            echo "Manual run with explicit version -> $VERSIONS"
          else
            VERSIONS='["v5.5.4","v5.4.2","v5.3.3"]'
            echo "Push/schedule/manual -> full matrix"
          fi
          echo "idf-versions=$VERSIONS" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.example }} (IDF ${{ matrix.idf-version }})
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJSON(needs.prepare-matrix.outputs.examples) }}
        idf-version: ${{ fromJSON(needs.prepare-matrix.outputs.idf-versions) }}
        target:
          - "esp32s3"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache ESP-IDF managed components
        uses: actions/cache@v4
        with:
          path: |
            **/managed_components
          key: ${{ runner.os }}-idf-${{ matrix.idf-version }}-${{ hashFiles('**/idf_component.yml') }}
          restore-keys: |
            ${{ runner.os }}-idf-${{ matrix.idf-version }}-

      - name: Build firmware (with strict warnings)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf-version }}
          target: ${{ matrix.target }}
          path: ${{ matrix.example }}
          extra_docker_args: -e EXTRA_CFLAGS=-Werror

      - name: Show firmware size
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf-version }}
          target: ${{ matrix.target }}
          path: ${{ matrix.example }}
          command: size

      - name: Generate build manifest
        shell: bash
        run: |
          EXAMPLE_PATH="${{ matrix.example }}"
          EXAMPLE_NAME=$(basename "$EXAMPLE_PATH")
          OUT_DIR="$ARTIFACTS_DIR/$EXAMPLE_NAME"
          mkdir -p "$OUT_DIR"

          cat > "$OUT_DIR/build_info.json" << EOF
          {
            "example": "$EXAMPLE_NAME",
            "example_path": "$EXAMPLE_PATH",
            "target": "${{ matrix.target }}",
            "idf_version": "${{ matrix.idf-version }}",
            "build_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "git_sha": "$GITHUB_SHA",
            "git_ref": "$GITHUB_REF"
          }
          EOF

      - name: Collect firmware artifacts
        if: success()
        shell: bash
        run: |
          EXAMPLE_PATH="${{ matrix.example }}"
          EXAMPLE_NAME=$(basename "$EXAMPLE_PATH")
          OUT_DIR="$ARTIFACTS_DIR/$EXAMPLE_NAME"
          mkdir -p "$OUT_DIR"

          cp "$EXAMPLE_PATH/build/bootloader/bootloader.bin" "$OUT_DIR/"
          cp "$EXAMPLE_PATH/build/partition_table/partition-table.bin" "$OUT_DIR/"
          cp "$EXAMPLE_PATH/build/"*.bin "$OUT_DIR/" 2>/dev/null || true
          cp "$EXAMPLE_PATH/build/"*.elf "$OUT_DIR/" 2>/dev/null || true
          cp "$EXAMPLE_PATH/build/"*.map "$OUT_DIR/" 2>/dev/null || true
          cp "$EXAMPLE_PATH/build/flasher_args.json" "$OUT_DIR/" 2>/dev/null || true

          ls -lh "$OUT_DIR"

      - name: Generate combined firmware image
        if: success()
        shell: bash
        run: |
          EXAMPLE_PATH="${{ matrix.example }}"
          EXAMPLE_NAME=$(basename "$EXAMPLE_PATH")
          OUT_DIR="$ARTIFACTS_DIR/$EXAMPLE_NAME"

          pip install --quiet esptool
          python -m esptool \
            --chip ${{ matrix.target }} \
            merge_bin \
            -o "$OUT_DIR/${EXAMPLE_NAME}_combined.bin" \
            @"$EXAMPLE_PATH/build/flasher_args.json"

          ls -lh "$OUT_DIR/${EXAMPLE_NAME}_combined.bin"

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-${{ matrix.idf-version }}-${{ matrix.example }}
          path: ${{ env.ARTIFACTS_DIR }}/
          retention-days: 30
