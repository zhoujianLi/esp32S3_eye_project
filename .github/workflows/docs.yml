name: Documentation Build & Validation

on:
  push:
    branches: [ master, main ]
    paths:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !.github/**/*.md
            !**/node_modules/**/*.md

  link-checker:
    name: Check Broken Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check links in markdown files
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --exclude-mail --exclude-loopback *.md docs/**/*.md
          fail: true

  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run spell check
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: |
            **/*.md
            **/*.c
            **/*.h
          config: .vscode/cspell.json
          incremental_files_only: false

  build-docs:
    name: Build Documentation Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocs-awesome-pages-plugin

      - name: Create mkdocs.yml if not exists
        run: |
          if [ ! -f mkdocs.yml ]; then
            cat > mkdocs.yml << 'EOF'
          site_name: ESP32-S3-EYE Project
          site_description: ESP32-S3-EYE development board firmware and examples
          theme:
            name: material
            palette:
              - media: "(prefers-color-scheme: light)"
                scheme: default
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/toggle-switch-off-outline
                  name: Switch to dark mode
              - media: "(prefers-color-scheme: dark)"
                scheme: slate
                primary: indigo
                accent: indigo
                toggle:
                  icon: material/toggle-switch
                  name: Switch to light mode
          plugins:
            - search
            - awesome-pages
          nav:
            - Home: README.md
            - Examples: examples/
            - Documentation: docs/
          EOF
          fi

      - name: Create README.md if not exists
        run: |
          if [ ! -f README.md ]; then
            cat > README.md << 'EOF'
          # ESP32-S3-EYE Project

          This repository contains firmware examples and tools for the ESP32-S3-EYE development board.

          ## Hardware

          The ESP32-S3-EYE is a development board featuring:
          - ESP32-S3 WROOM-1 module
          - LCD display
          - Camera interface
          - Microphone
          - SD card slot

          ## Examples

          - [LCD Display](examples/lcd_display/) - Basic LCD display functionality

          ## Building

          This project uses ESP-IDF. See the individual example directories for build instructions.
          EOF
          fi

      - name: Build documentation
        run: |
          mkdocs build --strict

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation-site
          path: site/
          retention-days: 7

  deploy-docs:
    name: Deploy Documentation to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs
        run: |
          pip install mkdocs mkdocs-material mkdocs-awesome-pages-plugin

      - name: Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force
